# Test profile — overrides main application.properties during test runs

# Exclude Redis auto-configuration entirely — no Redis connection attempted
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,\
  org.springframework.boot.autoconfigure.cache.RedisCacheConfiguration

# Use no-op cache (no Redis needed)
spring.cache.type=none

# H2 in-memory DB
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Quiet logs during tests
logging.level.root=WARN
logging.level.com.demo.redis=INFO
