# Test profile — overrides main application.properties during test runs

# Use no-op cache so tests never need a real Redis connection
spring.cache.type=none

# H2 in-memory DB (same as main, just explicit)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Suppress Redis auto-configuration errors
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Quiet logs during tests
logging.level.root=WARN
logging.level.com.demo.redis=INFO
