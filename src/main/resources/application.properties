# Application
spring.application.name=redis-cache-demo
server.port=8080

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:productdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Redis — values overridden by env vars injected from Kubernetes ConfigMap/Secret
# Env var format: SPRING_DATA_REDIS_HOST → spring.data.redis.host
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=${SPRING_DATA_REDIS_TIMEOUT:2000ms}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

# Cache
spring.cache.type=redis
spring.cache.redis.time-to-live=60000
spring.cache.redis.cache-null-values=false
spring.cache.cache-names=products,product

# Actuator — liveness and readiness probes used by Kubernetes
management.endpoints.web.exposure.include=health,info,caches,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Logging (set to DEBUG to observe cache hits/misses)
logging.level.com.demo.redis=DEBUG
logging.level.org.springframework.cache=TRACE
