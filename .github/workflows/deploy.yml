name: Build → Test → Deploy to Kubernetes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. your-username/redis-cache-demo

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — Run tests
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit and integration tests
        run: mvn test --no-transfer-progress

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: target/surefire-reports/


  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build JAR + Docker image → push to GitHub Container Registry
  # Only runs on push to main (not on PRs)
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write          # Required to push to ghcr.io

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (skip tests — already ran)
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # Auto-provided by GitHub

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-                  # e.g. sha-a1b2c3d
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}       # triggers on git tags like v1.0.0

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha        # GitHub Actions cache — faster builds
          cache-to: type=gha,mode=max


  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy to Kubernetes using kind (cluster runs inside the runner)
  # No external cluster or KUBE_CONFIG secret needed.
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes (kind)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.9.0
        with:
          cluster_name: redis-cache-demo

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Pull image from ghcr.io and load into kind
        run: |
          SHA_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA_TAG}"
          echo "IMAGE=${FULL_IMAGE}" >> $GITHUB_ENV

          # Authenticate to pull from ghcr.io
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # Pull and load into kind cluster (kind has its own Docker daemon)
          docker pull ${FULL_IMAGE}
          kind load docker-image ${FULL_IMAGE} --name redis-cache-demo

      - name: Update image in deployment manifest
        run: |
          sed -i "s|image: ghcr.io/soumyabhoj/redis-cache-demo:latest|image: ${IMAGE}|g" \
            k8s/app-deployment.yaml

      - name: Apply all Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/redis-secret.yaml
          kubectl apply -f k8s/app-configmap.yaml
          kubectl apply -f k8s/redis-deployment.yaml
          kubectl apply -f k8s/app-deployment.yaml

      - name: Wait for Redis to be ready
        run: |
          kubectl rollout status deployment/redis \
            -n redis-cache-demo --timeout=120s

      - name: Wait for app to be ready
        run: |
          kubectl rollout status deployment/redis-cache-demo \
            -n redis-cache-demo --timeout=300s

      - name: Verify all pods are running
        run: |
          kubectl get pods -n redis-cache-demo
          kubectl get services -n redis-cache-demo

      - name: Smoke test — health endpoint via port-forward
        run: |
          kubectl port-forward svc/redis-cache-demo-service 9090:80 \
            -n redis-cache-demo &
          PF_PID=$!
          sleep 10

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://localhost:9090/actuator/health)
          kill $PF_PID

          echo "Health check HTTP status: $HTTP_STATUS"
          [ "$HTTP_STATUS" = "200" ] || exit 1

      - name: Smoke test — products API
        run: |
          kubectl port-forward svc/redis-cache-demo-service 9090:80 \
            -n redis-cache-demo &
          PF_PID=$!
          sleep 5

          RESPONSE=$(curl -s http://localhost:9090/api/products)
          kill $PF_PID

          echo "API response: $RESPONSE"
          echo $RESPONSE | grep -q "Laptop" || exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back..."
          kubectl rollout undo deployment/redis-cache-demo \
            -n redis-cache-demo 2>/dev/null || echo "Nothing to roll back"
          kubectl get pods -n redis-cache-demo
